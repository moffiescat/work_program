spring.application.name=cognitive_health_management

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/cognitive_health?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis配置（使用注解方式）
mybatis.type-aliases-package=com.example.work_program.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt.secret=your-256-bit-secret-key-for-jwt-token-signing-cognitive-health-system
jwt.expiration=86400000

# 服务器配置
server.port=8080
